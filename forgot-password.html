<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - Hub66</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #0B1F3A; --accent: #D4AF37; --bg: #F5F7FA; --white: #FFFFFF; }
        body { font-family: 'Be Vietnam Pro', 'Inter', sans-serif; background: var(--bg); }
        .login-card { background: var(--white); border-radius: 16px; padding: 40px; box-shadow: 0 4px 24px rgba(11,31,58,0.1); max-width: 400px; margin: 60px auto; border: 1px solid rgba(212,175,55,0.2); }
        .login-card h3 { color: var(--primary); }
        .form-control { border-radius: 8px; padding: 12px 16px; border: 1px solid #e2e8f0; }
        .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(212,175,55,0.15); }
        footer { background: var(--primary); color: rgba(255,255,255,0.7); padding: 40px 0 20px; }
        footer a { color: rgba(255,255,255,0.7); text-decoration: none; }
        footer a:hover { color: var(--accent); }
        .btn-gold { background: var(--accent); color: var(--primary); border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; width: 100%; }
        .btn-gold:hover { background: #c9a430; }
        .text-gold { color: var(--accent) !important; }
        .text-muted { color: #6c757d; }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="fw-bold text-center mb-4"><i class="bi bi-diagram-3-fill text-gold"></i> <span style="color: var(--primary);">Hub66</span></h3>
        <h4 class="text-center mb-3" style="color: var(--primary);">Forgot Password</h4>
        <p class="text-center text-muted mb-4">Nhập email của bạn để nhận liên kết đặt lại mật khẩu.</p>
        <form id="forgotForm">
            <div class="mb-3">
                <label class="form-label" for="emailInput">Email</label>
                <input type="email" class="form-control" id="emailInput" placeholder="email@domain.com" required autocomplete="email">
                <div class="invalid-feedback" id="emailError"></div>
            </div>
            <button type="submit" class="btn btn-gold mb-3">Send Reset Link</button>
            <p class="text-center">
                <a href="premium_login.html" class="text-muted"><i class="bi bi-arrow-left"></i> Back to Login</a>
            </p>
        </form>
    </div>

    <footer>
        <div class="container text-center">
            <p class="small mb-0">© 2026 Hub66. Tài Chính Á Châu.</p>
            <a href="premium_index.html">Trang chủ</a> | <a href="premium_community.html">Cộng đồng</a> | <a href="premium_faq.html">FAQ</a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const emailInput = document.getElementById('emailInput');
            const email = emailInput.value.trim();
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!email) {
                emailInput.classList.add('is-invalid');
                document.getElementById('emailError').textContent = 'Vui lòng nhập email.';
                return;
            }

            if (!emailRegex.test(email)) {
                emailInput.classList.add('is-invalid');
                document.getElementById('emailError').textContent = 'Email không hợp lệ.';
                return;
            }

            emailInput.classList.remove('is-invalid');
            alert('Liên kết đặt lại mật khẩu đã được gửi đến email của bạn!');
        });

        document.getElementById('emailInput').addEventListener('input', function() {
            this.classList.remove('is-invalid');
        });
    </script>
</body>
</html>
